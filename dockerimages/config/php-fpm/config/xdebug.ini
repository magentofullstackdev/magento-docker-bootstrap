; Xdebug 3 — zero-config breakpoints.
; The container auto-discovers the IDE host; just make sure your IDE is
; listening on port 9001 and "discover client host" → start a debug
; session by setting cookie XDEBUG_SESSION=PHPSTORM (or use a browser
; helper extension).
xdebug.mode=debug
xdebug.start_with_request=trigger
xdebug.client_port=9001
xdebug.discover_client_host=true
xdebug.idekey=PHPSTORM
xdebug.output_dir="/var/www/html"
xdebug.cli_color=1
xdebug.var_display_max_depth=10
xdebug.var_display_max_children=256
xdebug.var_display_max_data=2048
xdebug.max_nesting_level=5000
xdebug.log_level=0
