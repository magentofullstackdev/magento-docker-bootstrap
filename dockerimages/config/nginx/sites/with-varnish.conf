# =====================================================================
# Varnish-fronted vhost: 80/443 → varnish:80, 8080 → Magento backend
# =====================================================================
map $http_x_forwarded_proto $fastcgi_https {
    default off;
    https on;
}

# 1. SSL termination + reverse proxy to Varnish
server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name ${SITE_HOST};

    ssl_certificate     /etc/nginx/certs/magento_site/server.crt;
    ssl_certificate_key /etc/nginx/certs/magento_site/server.key;

    # Use Docker's embedded DNS so the upstream is resolved lazily, not at
    # nginx start-up. Without this, nginx dies on boot if varnish isn't
    # registered in DNS yet (start order race).
    resolver 127.0.0.11 valid=10s ipv6=off;
    set $varnish_upstream "http://varnish:80";

    location / {
        proxy_pass $varnish_upstream;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;

        proxy_buffer_size       128k;
        proxy_buffers           4 256k;
        proxy_busy_buffers_size 256k;

        proxy_read_timeout    600s;
        proxy_connect_timeout 600s;
    }
}

# 2. Magento backend on 8080 (Varnish hits this)
server {
    listen 8080;
    server_name ${SITE_HOST};

    set $MAGE_ROOT /var/www/html;
    root $MAGE_ROOT/pub;
    index index.php;
    autoindex off;
    charset UTF-8;
    error_page 404 403 = /errors/404.php;

    location /.user.ini { deny all; }

    location ~* ^/setup($|/) {
        root $MAGE_ROOT;
        location ~ ^/setup/index.php {
            fastcgi_pass   fastcgi_backend;
            fastcgi_param  PHP_FLAG  "session.auto_start=off \n suhosin.session.cryptua=off";
            fastcgi_param  PHP_VALUE "memory_limit=756M \n max_execution_time=600";
            fastcgi_read_timeout 600s;
            fastcgi_connect_timeout 600s;
            fastcgi_index  index.php;
            fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
            include        fastcgi_params;
            fastcgi_param  HTTPS $fastcgi_https;
        }
        location ~ ^/setup/(?!pub/). { deny all; }
        location ~ ^/setup/pub/ { add_header X-Frame-Options "SAMEORIGIN"; }
    }

    location / { try_files $uri $uri/ /index.php$is_args$args; }

    location /pub/ {
        location ~ ^/pub/media/(downloadable|customer|import|custom_options|theme_customization/.*\.xml) { deny all; }
        alias $MAGE_ROOT/pub/;
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /static/ {
        location ~ ^/static/version\d*/ { rewrite ^/static/version\d*/(.*)$ /static/$1 last; }
        location ~* \.(ico|jpg|jpeg|png|gif|svg|svgz|webp|avif|avifs|js|css|eot|ttf|otf|woff|woff2|html|json)$ {
            add_header Cache-Control "public";
            add_header X-Frame-Options "SAMEORIGIN";
            expires +1y;
            if (!-f $request_filename) { rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last; }
        }
        if (!-f $request_filename) { rewrite ^/static/(version\d*/)?(.*)$ /static.php?resource=$2 last; }
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /media/ {
        try_files $uri $uri/ /get.php$is_args$args;
        location ~ ^/media/theme_customization/.*\.xml { deny all; }
        location ~* \.(ico|jpg|jpeg|png|gif|svg|svgz|webp|avif|avifs|js|css|eot|ttf|otf|woff|woff2)$ {
            add_header Cache-Control "public";
            expires +1y;
            try_files $uri $uri/ /get.php$is_args$args;
        }
        add_header X-Frame-Options "SAMEORIGIN";
    }

    location /media/customer/      { deny all; }
    location /media/downloadable/  { deny all; }
    location /media/import/        { deny all; }
    location /media/custom_options/{ deny all; }
    location /errors/ { location ~* \.xml$ { deny all; } }

    location ~ ^/(index|get|static|errors/report|errors/404|errors/503|health_check)\.php$ {
        try_files $uri =404;
        fastcgi_pass   fastcgi_backend;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_param  PHP_FLAG  "session.auto_start=off \n suhosin.session.cryptua=off";
        fastcgi_param  PHP_VALUE "memory_limit=2048M \n max_execution_time=18000";
        fastcgi_read_timeout 600s;
        fastcgi_connect_timeout 600s;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME  $document_root$fastcgi_script_name;
        include        fastcgi_params;
        fastcgi_param  HTTPS $fastcgi_https;
    }

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1100;
    gzip_proxied any;
    gzip_types text/plain text/css text/js text/xml text/javascript application/javascript application/json application/xml image/svg+xml;
    gzip_vary on;

    location ~* (\.php$|\.phtml$|\.htaccess$|\.git) { deny all; }
}
